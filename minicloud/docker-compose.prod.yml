services:
  web-frontend-server:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-web:${IMAGE_TAG}
    container_name: minicloud-web
    ports:
      - "8080:80"
    networks:
      - cloud-net
    restart: unless-stopped

  web-frontend-server-1:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-web-lb1:${IMAGE_TAG}
    container_name: minicloud-web-1
    ports:
      - "8082:80"
    networks:
      - cloud-net
    restart: unless-stopped

  web-frontend-server-2:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-web-lb2:${IMAGE_TAG}
    container_name: minicloud-web-2
    ports:
      - "8083:80"
    networks:
      - cloud-net
    restart: unless-stopped

  application-backend-server:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-backend:${IMAGE_TAG}
    container_name: minicloud-app
    environment:
      OIDC_ISSUER: http://authentication-identity-server:8080/auth/realms/realm_sv001
      OIDC_AUDIENCE: flask-app
      DB_HOST: relational-database-server
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: studentdb
    ports:
      - "8085:8081"
    networks:
      - cloud-net
    restart: unless-stopped

  relational-database-server:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-db:${IMAGE_TAG}
    container_name: minicloud-db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: minicloud
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - cloud-net
    restart: unless-stopped

  authentication-identity-server:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-keycloak:${IMAGE_TAG}
    container_name: minicloud-auth
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8081:8080"
    networks:
      - cloud-net
    restart: unless-stopped

  keycloak-init:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-keycloak-init:${IMAGE_TAG}
    container_name: minicloud-auth-init
    depends_on:
      - authentication-identity-server
    networks:
      - cloud-net
    restart: "no"

  object-storage-server:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-minio:${IMAGE_TAG}
    container_name: minicloud-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - cloud-net
    restart: unless-stopped

  object-storage-init:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-minio-init:${IMAGE_TAG}
    container_name: minicloud-minio-init
    depends_on:
      - object-storage-server
    networks:
      - cloud-net
    restart: "no"

  internal-dns-server:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-bind9:${IMAGE_TAG}
    container_name: minicloud-dns
    ports:
      - "1053:53/udp"
    networks:
      - cloud-net
    restart: unless-stopped

  monitoring-node-exporter-server:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-node-exporter:${IMAGE_TAG}
    container_name: minicloud-node-exporter
    ports:
      - "9100:9100"
    networks:
      - cloud-net
    restart: unless-stopped

  monitoring-prometheus-server:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-prometheus:${IMAGE_TAG}
    container_name: minicloud-prometheus
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - cloud-net
    restart: unless-stopped

  monitoring-grafana-dashboard-server:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-grafana:${IMAGE_TAG}
    container_name: minicloud-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - cloud-net
    restart: unless-stopped

  api-gateway-proxy-server:
    image: ${DOCKERHUB_NAMESPACE}/myminicloud-proxy:${IMAGE_TAG}
    container_name: minicloud-proxy
    depends_on:
      web-frontend-server:
        condition: service_started
      web-frontend-server-1:
        condition: service_started
      web-frontend-server-2:
        condition: service_started
      application-backend-server:
        condition: service_started
      authentication-identity-server:
        condition: service_started
    ports:
      - "80:80"
    networks:
      - cloud-net
    restart: unless-stopped

networks:
  cloud-net:
    name: cloud-net

volumes:
  db_data:
  minio_data:
  prometheus_data:
  grafana_data:
