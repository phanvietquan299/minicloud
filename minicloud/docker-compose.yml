services:
  web-frontend-server:
    build:
      context: ./web
      args:
        SERVER_LABEL: core
    image: myminicloud/web-frontend:dev
    container_name: minicloud-web
    ports:
      - "8080:80"
    volumes:
      - ./web/html:/usr/share/nginx/html:ro
    networks:
      - cloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-frontend-server-1:
    build:
      context: ./web
      args:
        SERVER_LABEL: web-1
    image: myminicloud/web-frontend:lb1
    container_name: minicloud-web-1
    ports:
      - "8082:80"
    volumes:
      - ./web/html:/usr/share/nginx/html:ro
    networks:
      - cloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-frontend-server-2:
    build:
      context: ./web
      args:
        SERVER_LABEL: web-2
    image: myminicloud/web-frontend:lb2
    container_name: minicloud-web-2
    ports:
      - "8083:80"
    volumes:
      - ./web/html:/usr/share/nginx/html:ro
    networks:
      - cloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  application-backend-server:
    build:
      context: ./app
    image: myminicloud/backend:dev
    container_name: minicloud-app
    environment:
      OIDC_ISSUER: http://authentication-identity-server:8080/auth/realms/realm_sv001
      OIDC_AUDIENCE: flask-app
      DB_HOST: relational-database-server
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: studentdb
    ports:
      - "8085:8081"
    networks:
      - cloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  relational-database-server:
    image: mariadb:11
    container_name: minicloud-db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: minicloud
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - cloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  authentication-identity-server:
    image: quay.io/keycloak/keycloak:25.0.5
    container_name: minicloud-auth
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8081:8080"
    volumes:
      - ./auth/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - cloud-net
    restart: unless-stopped

  keycloak-init:
    image: python:3.11-alpine
    container_name: minicloud-auth-init
    depends_on:
      - authentication-identity-server
    volumes:
      - ./auth/init-keycloak.py:/init-keycloak.py:ro
    command: ["python", "/init-keycloak.py"]
    networks:
      - cloud-net
    restart: "no"

  object-storage-server:
    image: minio/minio:latest
    container_name: minicloud-minio
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./minio/data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - cloud-net
    restart: unless-stopped

  object-storage-init:
    image: minio/mc:latest
    container_name: minicloud-minio-init
    depends_on:
      - object-storage-server
    volumes:
      - ./minio/init:/init:ro
    entrypoint: ["/bin/sh", "/init/init.sh"]
    networks:
      - cloud-net
    restart: "no"

  internal-dns-server:
    image: internetsystemsconsortium/bind9:9.18
    container_name: minicloud-dns
    volumes:
      - ./dns/named.conf:/etc/bind/named.conf:ro
      - ./dns/named.conf.options:/etc/bind/named.conf.options:ro
      - ./dns/named.conf.local:/etc/bind/named.conf.local:ro
      - ./dns/db.cloud.local:/etc/bind/db.cloud.local:ro
    ports:
      - "1053:53/udp"
    networks:
      - cloud-net
    restart: unless-stopped

  monitoring-node-exporter-server:
    image: prom/node-exporter:latest
    container_name: minicloud-node-exporter
    ports:
      - "9100:9100"
    networks:
      - cloud-net
    restart: unless-stopped

  monitoring-prometheus-server:
    image: prom/prometheus:latest
    container_name: minicloud-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - cloud-net
    restart: unless-stopped

  monitoring-grafana-dashboard-server:
    image: grafana/grafana:latest
    container_name: minicloud-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards/system-health.json:/var/lib/grafana/dashboards/system-health.json:ro
    ports:
      - "3000:3000"
    networks:
      - cloud-net
    restart: unless-stopped

  api-gateway-proxy-server:
    image: nginx:stable
    container_name: minicloud-proxy
    depends_on:
      web-frontend-server:
        condition: service_healthy
      web-frontend-server-1:
        condition: service_healthy
      web-frontend-server-2:
        condition: service_healthy
      application-backend-server:
        condition: service_healthy
      authentication-identity-server:
        condition: service_started
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - cloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  cloud-net:
    name: cloud-net
