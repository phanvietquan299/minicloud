name: MyMiniCloud CI CD

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose -f minicloud/docker-compose.yml up -d --build

      - name: Wait for services and run smoke tests
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ >/dev/null && \
               curl -fsS http://localhost:8085/hello >/dev/null && \
               curl -fsS http://localhost/api/student >/dev/null && \
               curl -fsS http://localhost/api/hello >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f minicloud/docker-compose.yml ps
          docker compose -f minicloud/docker-compose.yml logs --no-color
          exit 1

      - name: Shutdown stack
        if: always()
        run: docker compose -f minicloud/docker-compose.yml down -v

  cd:
    name: Build and push Docker Hub images
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web images
        run: |
          docker build --build-arg SERVER_LABEL=core -t "$DOCKERHUB_NAMESPACE/myminicloud-web:$IMAGE_TAG" ./minicloud/web
          docker build --build-arg SERVER_LABEL=lb1 -t "$DOCKERHUB_NAMESPACE/myminicloud-web-lb1:$IMAGE_TAG" ./minicloud/web
          docker build --build-arg SERVER_LABEL=lb2 -t "$DOCKERHUB_NAMESPACE/myminicloud-web-lb2:$IMAGE_TAG" ./minicloud/web
          docker push "$DOCKERHUB_NAMESPACE/myminicloud-web:$IMAGE_TAG"
          docker push "$DOCKERHUB_NAMESPACE/myminicloud-web-lb1:$IMAGE_TAG"
          docker push "$DOCKERHUB_NAMESPACE/myminicloud-web-lb2:$IMAGE_TAG"

      - name: Build and push backend image
        run: |
          docker build -t "$DOCKERHUB_NAMESPACE/myminicloud-backend:$IMAGE_TAG" ./minicloud/app
          docker push "$DOCKERHUB_NAMESPACE/myminicloud-backend:$IMAGE_TAG"

      - name: Show next deploy command
        run: |
          echo "After images are pushed, deploy on EC2 with:"
          echo "docker compose -f minicloud/docker-compose.aws.yml --env-file .env up -d"
